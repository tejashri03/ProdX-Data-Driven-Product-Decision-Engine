version: '3.8'

services:
  # Main A/B Testing Platform
  ab-testing-platform:
    build: .
    container_name: ab-testing-platform
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=ab_testing
      - DB_USER=analyst
      - DB_PASSWORD=secure_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - ab-testing-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ab-testing-postgres
    environment:
      - POSTGRES_DB=ab_testing
      - POSTGRES_USER=analyst
      - POSTGRES_PASSWORD=secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - ab-testing-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ab-testing-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - ab-testing-network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: ab-testing-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - ab-testing-network

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: ab-testing-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    restart: unless-stopped
    networks:
      - ab-testing-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ab-testing-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - ab-testing-platform
    restart: unless-stopped
    networks:
      - ab-testing-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  ab-testing-network:
    driver: bridge
